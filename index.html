<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetMatric.in</title>

    <link rel="stylesheet" href="leetmatric.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&family=Orbitron&display=swap" rel="stylesheet">
    
</head>

<body>

    <header class="header">

        <div class="logo">
            <a href="index.html">SunRise Project 🔥</a>
        </div>


        <!-- desktop -->
        <div class="nav">
            
            <a href="https://cors-anywhere.herokuapp.com/corsdemo">Setup</a>
            <a href="https://leetcode.com" target="_blank">LeetCode</a>
            <a href="Counter.html" target="_blank">Counter</a>
            <a href="about.html">About</a>
            <a href="mailto:2024umt1411@mnit.ac.in">Contact Us</a>
            <button id="theme-toggle">
                <i class="fa-regular fa-moon"></i>
            </button>
        </div>


        <!--mobile -->
        <nav class="navMin" id="navMenu">
            <a href="index.html">Home</a>
           <a href="https://cors-anywhere.herokuapp.com/corsdemo">Setup</a>
            <a href="https://leetcode.com" target="_blank">LeetCode</a>
            <a href="Counter.html" target="_blank">Counter</a>
            <a href="about.html" >About</a>
            <a href="mailto:2024umt1411@mnit.ac.in">Contact Us</a>
        </nav>

        <div class="hamburger" id="hamburger">
            <i class="fa-solid fa-bars"></i>
        </div>

    </header>


    <div class="main-container">

        <!-- heading -->
         <div class="heading">
            <h2>Welcome to Progress App ✅</h2>
            <a href="about.html">How to use ?</a>
         </div>
        
        <!-- user data-->
        <div class="user-container">
            <p>Enter your Leetcode username:</p>
            <div class="user-input-container">
                <input type="text" placeholder=" eg. srmcoder123" id="user-input">
                <button id="search-button">Search</button>    
            </div>
        </div>

        <!-- stats-->
        <div class="stats-container">

            <div class="progress">

                <div class="progress-item ">
                    <div class="easy-progress circle">
                        <span id="easy-label">Easy</span>
                    </div>
                </div>

                <div class="progress-item ">
                    <div class="medium-progress circle">
                        <span id="medium-label">Medium</span>
                    </div>
                </div>

                <div class="progress-item">
                    <div class="hard-progress circle">
                        <span id="hard-label">Hard</span>
                    </div>
                </div>
            </div> 

            
        </div>
            
        <div class="stats-card">
            <div class="progress-boxes">
                <div id="progress-easy-btn">Easy</div>
                <div id="progress-medium-btn">Medium</div>
                <div id="progress-hard-btn">Hard</div>

                <div id="contest-rating">Contest Rating</div>
            </div>
        </div>

    </div>


 

    <footer>
        All Rights Reserverd &#169 2026
    </footer>

    <script src="leetmatric.js"></script>

</body>
</html>
