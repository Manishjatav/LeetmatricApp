<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetMatric.in</title>

    <link rel="stylesheet" href="leetmatric.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geom:ital,wght@0,300..900;1,300..900&family=Mulish:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=dark_mode" />
    
</head>

<body>

    <header class="header">

        <div class="logo">
            SunRise Project ☀️
        </div>

        <div class="nav">
            <a href="https://cors-anywhere.herokuapp.com/corsdemo">Setup</a>
            <a href="https://leetcode.com" target="_blank">LeetCode</a>
            <a href="Counter.html" target="_blank">Counter</a>
            <a href="" target="_blank">About</a>
            <a href="http://localhost:5173/">Cryx</a>
            <a href="mailto:example@gmail.com">Contact Us</a>
            <button id="theme-toggle">
                <span class="material-symbols-outlined">dark_mode</span>
            </button>
        </div>

    </header>


    <div class="main-container">
    <!-- heading -> userdata -> stats -->

        <!-- heading -->
        <h2>Welcome to Leetmatric App ✅</h2>

        <!-- user data-->
        <div class="user-container">
            <p>Enter your username :</p>
            <div class="user-input-container">
                <input type="text" placeholder=" eg. srmcoder123" id="user-input">
                <button id="search-button">Search</button>    
            </div>
        </div>

        <!-- stats-->
        <div class="stats-container">

                <div class="progress">

                    <div class="progress-item ">
                        <div class="easy-progress circle">
                            <span id="easy-label">Easy</span>
                            <!-- <p>Easy</p> -->
                        </div>
                    </div>

                    <div class="progress-item ">
                        <div class="medium-progress circle">
                            <span id="medium-label">Medium</span>
                            <!-- <p>Medium</p> -->
                        </div>
                    </div>

                    <div class="progress-item">
                        <div class="hard-progress circle">
                            <span id="hard-label">Hard</span>
                            <!-- <p>Hard</p> -->
                        </div>
                    </div>
                </div> 

                
            </div>

            <div class="stats-card">
                <div class="progress-boxes">
                    <div id="progress-easy-btn">Easy</div>
                    <div id="progress-medium-btn">Medium</div>
                    <div id="progress-hard-btn">Hard</div>

                    <div id="contest-rating">Contest Rating</div>
                </div>
            </div>

        </div>

    </div>


    <footer>All Rights Reserverd &#169 2026</footer>

    <script src="leetmatric.js"></script>

</body>
</html>
