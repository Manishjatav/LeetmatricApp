<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <link rel="stylesheet" href="counter.css">
</head>
<body>
    <!--Jai shree ram -->
    <div class="main_div">
        <!-- btn_container -->
        <div class="counting_div">
            <h3>COUNTER</h3>
            <div class="counting_btn" id="count_btn">
                <p>➕</p>
            </div>
        </div>
        
        <!-- other_btns-container -->
         <div class="other_btns_div">
            <!-- reset button -->
            <div class="other_btns" id="reset_btn">
                <p>🔄️</p>
            </div>
            <!-- negative count button -->
            <div class="other_btns" id="neg_count_btn">
                <span>➖</span>
            </div>
         </div>
         

    </div>


    <script src="counter.js"></script>
</body>
</html>
