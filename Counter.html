<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <link rel="stylesheet" href="counter.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"> 
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">
</head>
<body>
    <!--Jai shree ram -->
    <div class="main_div">
        <!-- btn_container -->
        <div class="counting_div">
            <h1>Counter</h1>
            <div class="counting_btn" id="count_btn">
                <p><i class="fa-solid fa-plus"></i></p>
            </div>
        </div>
        
        <!-- other_btns-container -->
         <div class="other_btns_div">
            <!-- reset button -->
            <div class="other_btns" id="reset_btn">
                <p><i class="fa-solid fa-repeat"></i></p>
            </div>
            <!-- negative count button -->
            <div class="other_btns" id="neg_count_btn">
                <span><i class="fa-solid fa-minus"></i></span>
            </div>
         </div>
         

    </div>


    <script src="counter.js"></script>
</body>
</html>
